# sr-monitoring stack — Loki + Promtail + Grafana for fleet log
# aggregation. MP-21 (master-plan §2.5.5).
#
# Operator deployment plan:
#   1. Create the new repo:
#      gh repo create whasamatau-homelab/sr-monitoring --public
#   2. Move this file + the Promtail config to that repo's root.
#   3. Create POSIX datasets:
#        zfs create data-pool/apps/sr-monitoring
#        zfs create data-pool/apps/sr-monitoring/loki
#        zfs create data-pool/apps/sr-monitoring/grafana
#      with ownership matching the container UIDs (loki: 10001, grafana: 472).
#   4. Create the Portainer stack:
#        POST /api/stacks/create/standalone/repository
#        with repositoryURL=https://github.com/whasamatau-homelab/sr-monitoring.git
#        + repositoryAuthentication=true + repositoryGitCredentialID=17
#        + autoUpdate.webhook=<uuid> + autoUpdate.interval=5m
#        + autoUpdate.forceUpdate=false + autoUpdate.forcePullImage=true
#        + supportRelativePath=true + filesystemPath=/mnt/data-pool/apps/sr-monitoring/repo
#   5. Add Tailscale auth-key as stack env if exposing externally.
#
# Does NOT deploy automatically — the file lives under sr-claw-rev/docs/
# until the operator decides the 5+-instance trigger is met.

services:
  loki:
    image: grafana/loki:3.3.2
    container_name: sr-monitoring-loki
    restart: unless-stopped
    user: "10001:10001"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - /mnt/data-pool/apps/sr-monitoring/loki:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  promtail:
    image: grafana/promtail:3.3.2
    container_name: sr-monitoring-promtail
    restart: unless-stopped
    volumes:
      # Docker socket for label discovery via the docker-sd target.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Read-only access to Docker container logs.
      - /mnt/.ix-apps/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /mnt/data-pool/apps/sr-monitoring/promtail:/var/promtail
    command: ["-config.file=/etc/promtail/config.yaml"]
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: sr-monitoring-grafana
    restart: unless-stopped
    user: "472:472"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?must be set in stack env}
      - GF_INSTALL_PLUGINS=
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - /mnt/data-pool/apps/sr-monitoring/grafana:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # --- Metrics + traces + OTLP ingest (replaces the retired SigNoz stack) ---
  # Image tags below are pinned to plausible May-2026 releases; verify the
  # exact tags exist before first deploy. Renovate adds @sha256 digest pins
  # and tracks bumps thereafter (no Watchtower on this stack).

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    container_name: sr-monitoring-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — fleet telemetry ingest
      - "4318:4318"   # OTLP HTTP — fleet telemetry ingest
    # No healthcheck: the contrib image is distroless (no shell). The
    # health_check extension is exposed on :13133 for external probes.
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
      tempo:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: sr-monitoring-prometheus
    restart: unless-stopped
    user: "65534:65534"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-remote-write-receiver
    volumes:
      - /mnt/data-pool/apps/sr-monitoring/prometheus:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.8.0
    container_name: sr-monitoring-tempo
    restart: unless-stopped
    user: "10001:10001"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - /mnt/data-pool/apps/sr-monitoring/tempo:/var/tempo
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - "3200:3200"   # Tempo API (Grafana datasource); OTLP stays in-network
