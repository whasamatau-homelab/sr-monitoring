# MP-21 Loki config. Single-binary mode (no clustering at this scale).
# Filesystem-backed; Postgres index + S3-style boltdb-shipper retention
# is overkill until we cross 100GB/day, which we won't.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Per master-plan risk-mitigation: limit labels to (stack, container,
# level). Don't ingest raw container env or free-form fields — Loki
# cardinality explosions are the canonical Loki incident class.
limits_config:
  retention_period: 168h          # 7 days, plenty for fleet-debug use cases
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 6
  max_label_names_per_series: 15
  max_label_value_length: 2048

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
