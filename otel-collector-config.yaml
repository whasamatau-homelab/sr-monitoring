# OpenTelemetry Collector (contrib) — single ingest point for the fleet.
# Replaces the SigNoz collector. Static config (no OpAMP remote management),
# so the server<->collector version-skew failure class cannot recur.
#
# OTLP in (4317 gRPC / 4318 HTTP) -> fan out to Loki / Prometheus / Tempo.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    timeout: 10s

exporters:
  # Logs -> Loki native OTLP endpoint (Loki 3.x ingests OTLP directly).
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  # Metrics -> Prometheus via remote-write (Prometheus started with
  # --web.enable-remote-write-receiver).
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true
  # Traces -> Tempo OTLP receiver (in-network, plaintext).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]
  telemetry:
    logs:
      level: info
